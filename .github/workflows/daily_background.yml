name: Daily Background Generator

on:
  schedule:
    - cron: '15 21 * * 1-5'   # 9:15PM UTC = 5:15PM EDT, weekdays only (after US market close)
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

permissions:
  contents: write

jobs:
  generate-background:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pillow yfinance

      - name: Install Korean fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Generate background with live market data
        run: python -u scripts/generate_background.py

      - name: Generate S&P 500 movers image
        run: python -u scripts/generate_movers.py

      - name: Generate S&P 500 sector map
        run: python -u scripts/generate_sectors.py

      - name: Commit and push updated background
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add assets/background.jpg assets/movers.jpg assets/sectors.jpg assets/market_data.json
          git diff --staged --quiet || git commit -m "chore: update background $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
