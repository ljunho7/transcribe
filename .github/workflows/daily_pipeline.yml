name: Daily Korean News Podcast

on:
  schedule:
    - cron: '30 21 * * 0-5'   # 9:30PM UTC = 5:30PM EDT (NY time)
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg and Korean fonts
        run: sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Pre-download faster-whisper model
        run: python -c "from faster_whisper import WhisperModel; WhisperModel('tiny', device='cpu', compute_type='int8'); print('Model ready.')"

      - name: Step 1 — Fetch latest podcast episodes
        run: python -u scripts/fetch_rss.py

      - name: Step 2 — Transcribe with Groq Whisper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -u scripts/transcribe.py

      - name: Step 3 — Summarize and translate to Korean (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u scripts/summarize_translate.py

      - name: Step 3.5 — Extract tickers and bullet points (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -u scripts/ticker_chart.py --extract-only

      - name: Step 3.6 — Review script and bullet points (Gemini + GPT-4o)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -u scripts/review_script.py

      - name: Step 3.7 — Generate charts from reviewed data (yfinance + FRED)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python -u scripts/ticker_chart.py --charts-only

      - name: Step 3.8 — Fetch earnings calendar (Finnhub)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python -u scripts/economic_calendar.py

      - name: Step 4 — Generate Korean voice (Google Cloud TTS → Edge TTS fallback)
        env:
          GOOGLE_TTS_KEY: ${{ secrets.GOOGLE_TTS_KEY }}
        run: python -u scripts/generate_voice.py

      - name: Step 5 — Assemble video (FFmpeg)
        run: python -u scripts/assemble_video.py

      - name: Step 5.5 — Analyze video for chapters and tags
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud_vi_key.json
          GOOGLE_TTS_KEY: ${{ secrets.GOOGLE_TTS_KEY }}
        run: |
          echo "$GOOGLE_TTS_KEY" > /tmp/gcloud_vi_key.json
          python -u scripts/video_intelligence.py

      - name: Step 6 — Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python -u scripts/upload_youtube.py

      - name: Clean up temp files
        if: always()
        run: rm -rf temp/
